<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 56" role="img" aria-labelledby="c2-title">
  <title id="c2-title">getgrade Logo</title>
  <defs>
    <linearGradient id="arrow-grad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#B8922F"/>
      <stop offset="100%" stop-color="#D4A853"/>
    </linearGradient>
    <style>
      .bg { fill: #1B1B18; }
      .bar { fill: url(#arrow-grad); }
      .wordmark { fill: #1B1B18; font-family: 'Sora', 'Inter', 'Helvetica Neue', sans-serif; font-weight: 700; font-size: 26px; letter-spacing: -0.5px; }
    </style>
  </defs>

  <!-- Icon: Three ascending bars (grade improvement chart) -->
  <g id="icon">
    <rect class="bg" x="0" y="0" width="48" height="48" rx="11" ry="11"/>
    <!-- Three bars ascending left to right -->
    <rect class="bar" x="10" y="28" width="7" height="12" rx="1.5"/>
    <rect class="bar" x="20.5" y="20" width="7" height="20" rx="1.5"/>
    <rect class="bar" x="31" y="12" width="7" height="28" rx="1.5"/>
    <!-- Small star at top of tallest bar -->
    <circle cx="34.5" cy="9" r="2" fill="#D4A853"/>
  </g>

  <!-- Wordmark -->
  <text x="60" y="36" class="wordmark">getgrade</text>
</svg>