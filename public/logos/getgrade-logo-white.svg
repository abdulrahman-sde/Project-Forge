<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 56" role="img" aria-labelledby="white-title">
  <title id="white-title">getgrade Logo (Light)</title>
  <defs>
    <style>
      .wordmark { fill: #FAFAF7; font-family: 'Sora', 'Inter', 'Helvetica Neue', sans-serif; font-weight: 700; font-size: 26px; letter-spacing: -0.5px; }
    </style>
  </defs>

  <!-- Icon with ivory background -->
