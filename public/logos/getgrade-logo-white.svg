    <line x1="36" y1="12" x2="36" y2="20" stroke="#D4A853" stroke-width="2" stroke-linecap="round"/>
    <line x1="32" y1="16" x2="40" y2="16" stroke="#D4A853" stroke-width="2" stroke-linecap="round"/>
